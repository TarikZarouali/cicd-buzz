name: CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest==7.4.0 attrs==22.2.0

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=tests/
        flake8 . --count --max-complexity=10 --max-line-length=127 --statistics --exclude=tests/

    - name: Test with pytest
      run: |
        pytest tests/ -v

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'cicd-buzz-tarik'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
